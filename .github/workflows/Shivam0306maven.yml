name: Allure Report | @shivam
run-name: ${{ github.actor }} is creating Allure report 🚀

on:
  push:
    branches-ignore:
      - '!main'

jobs:
  autotests:
    name: Run tests and generate Allure Report
    runs-on: ubuntu-latest
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4  # Updated to a stable version
        
      - name: Set up Java 21
        uses: actions/setup-java@v4  # Updated to a stable version
        with:
          java-version: 21
          distribution: 'adopt'
          cache: 'maven'

      - name: Clean Allure results directory
        run: rm -rf target/allure-results/*

      - name: Create target directory if not exists
        run: mkdir -p target/allure-results

      - name: Set permissions for target directory
        run: chmod -R 777 target
      
      - name: Run Test
        run: mvn verify
        continue-on-error: true
          
      - name: Setup Allure History
        uses: actions/checkout@v4  # Updated to a stable version
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1.8
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: gh-pages/allure-history  # Corrected path to match gh-pages setup

      - name: Publish Allure Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages/allure-history  # Corrected path to match generated report
